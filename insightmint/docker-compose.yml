services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: insightmint-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    networks:
      - insightmint-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: insightmint-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - insightmint-network

networks:
  insightmint-network:
    driver: bridge
